<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8fafc" rx="8"/>
  
  <!-- Header -->
  <text x="400" y="40" font-family="Inter, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#064e3b">SYSTEM ARCHITECTURE: MODULE INTERACTIONS</text>
  
  <!-- Strategic Layer (Admin) -->
  <rect x="50" y="70" width="700" height="220" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-dasharray="5,5"/>
  <text x="65" y="90" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#64748b">ADMIN STRATEGIC LAYER</text>
  
  <!-- Forecasting Module -->
  <rect x="80" y="110" width="310" height="150" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="235" y="130" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#064e3b">FORECASTING MODULE</text>
  <text x="95" y="155" font-family="Inter, sans-serif" font-size="11" fill="#065f46">• Inputs: Sales, Import, Population</text>
  <text x="95" y="175" font-family="Inter, sans-serif" font-size="11" fill="#065f46">• Process: B2B & Consumer Prediction</text>
  <text x="95" y="195" font-family="Inter, sans-serif" font-size="11" fill="#065f46">• Output: E-Waste & Regional Trends</text>
  
  <!-- Sustainability Module -->
  <rect x="410" y="110" width="310" height="150" rx="8" fill="#f0f9ff" stroke="#0ea5e9"/>
  <text x="565" y="130" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#0c4a6e">SUSTAINABILITY SCORE MODULE</text>
  <text x="425" y="155" font-family="Inter, sans-serif" font-size="11" fill="#075985">• Inputs: B2B Data, Region Master</text>
  <text x="425" y="175" font-family="Inter, sans-serif" font-size="11" fill="#075985">• Process: Recommendation Engine</text>
  <text x="425" y="195" font-family="Inter, sans-serif" font-size="11" fill="#075985">• Output: Infrastructure & Logistics</text>

  <!-- Flow Arrow -->
  <path d="M 390 185 L 410 185" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="400" y="175" font-family="Inter, sans-serif" font-size="9" text-anchor="middle" fill="#64748b">PREDICTIONS</text>

  <!-- Operational Layer (Employee) -->
  <rect x="50" y="310" width="700" height="260" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-dasharray="5,5"/>
  <text x="65" y="330" font-family="Inter, sans-serif" font-size="12" font-weight="bold" fill="#64748b">EMPLOYEE OPERATIONAL LAYER</text>

  <!-- Reusability Workflow -->
  <rect x="80" y="350" width="640" height="200" rx="8" fill="#f1f5f9" stroke="#475569"/>
  <text x="400" y="370" font-family="Inter, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#1e293b">REUSABILITY MODULE WORKFLOW</text>
  
  <!-- Workflow Nodes -->
  <rect x="100" y="390" width="80" height="40" rx="4" fill="#fff" stroke="#94a3b8"/>
  <text x="140" y="415" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Image Upload</text>
  
  <rect x="210" y="390" width="80" height="40" rx="4" fill="#fff" stroke="#94a3b8"/>
  <text x="250" y="415" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">CV / ID</text>
  
  <rect x="320" y="390" width="80" height="40" rx="4" fill="#fff" stroke="#94a3b8"/>
  <text x="360" y="415" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">Audit / Assessment</text>
  
  <rect x="430" y="385" width="100" height="50" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="480" y="410" font-family="Inter, sans-serif" font-size="10" font-weight="bold" text-anchor="middle">Recycle Possible?</text>

  <rect x="570" y="360" width="120" height="40" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="630" y="385" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">TRUE: Value Suggestion</text>

  <rect x="570" y="430" width="120" height="40" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="630" y="455" font-family="Inter, sans-serif" font-size="10" text-anchor="middle">FALSE: E-Waste Value</text>

  <!-- Connectors -->
  <line x1="180" y1="410" x2="210" y2="410" stroke="#94a3b8" stroke-width="2"/>
  <line x1="290" y1="410" x2="320" y2="410" stroke="#94a3b8" stroke-width="2"/>
  <line x1="400" y1="410" x2="430" y2="410" stroke="#94a3b8" stroke-width="2"/>
  <path d="M 530 410 L 550 410 L 550 380 L 570 380" stroke="#94a3b8" stroke-width="2" fill="none"/>
  <path d="M 530 410 L 550 410 L 550 450 L 570 450" stroke="#94a3b8" stroke-width="2" fill="none"/>

  <!-- Arrowheads -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
  </defs>
</svg>
