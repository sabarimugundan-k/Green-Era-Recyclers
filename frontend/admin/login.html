<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - GreenEra</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body>
  <div class="admin-login-page">
    <div class="admin-login-left">
      <div>
        <i class="bi bi-recycle fs-1 mb-3 d-block"></i>
        <h1>GreenEra<br>Admin Portal</h1>
        <p>Manage your e-waste recycling platform — staff, products, assessments, and analytics in one place.</p>
        <div class="d-flex gap-4 mt-4">
          <div><small class="opacity-50">Active Staff</small><h4 class="text-white mb-0">24</h4></div>
          <div><small class="opacity-50">Total Products</small><h4 class="text-white mb-0">12,450</h4></div>
          <div><small class="opacity-50">Revenue</small><h4 class="text-white mb-0">₹2.05Cr</h4></div>
        </div>
      </div>
    </div>
    <div class="admin-login-right">
      <div class="admin-login-card">
        <div class="logo">
          <i class="bi bi-shield-lock"></i>
          <h4>Admin Login</h4>
          <p>Sign in to access the admin dashboard</p>
        </div>
        <form id="adminLoginForm">
          <div class="form-floating mb-3">
            <input type="text" class="form-control" id="adminUser" placeholder="Username" required autofocus>
            <label for="adminUser"><i class="bi bi-person me-1"></i> Admin Username</label>
          </div>
          <div class="form-floating mb-3">
            <input type="password" class="form-control" id="adminPass" placeholder="Password" required>
            <label for="adminPass"><i class="bi bi-lock me-1"></i> Password</label>
          </div>
          <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="adminRemember">
              <label class="form-check-label" for="adminRemember">Remember me</label>
            </div>
          </div>
          <button type="submit" class="btn btn-primary-green w-100 btn-lg">
            <i class="bi bi-box-arrow-in-right me-2"></i> Sign In
          </button>
          <div id="adminLoginError" class="alert alert-danger mt-3 d-none"></div>
        </form>
        <div class="text-center mt-4">
          <a href="../index.html" class="text-decoration-none text-muted small"><i class="bi bi-arrow-left me-1"></i> Back to Website</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/admin-login.js"></script>
</body>
</html>
