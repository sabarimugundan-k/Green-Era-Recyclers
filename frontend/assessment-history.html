<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Assessment History - Green Era Recyclers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="dashboard-body">
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container-fluid px-4">
      <a class="navbar-brand" href="dashboard.html"><i class="bi bi-recycle"></i> Green Era Recyclers</a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-muted d-none d-md-inline">Assessment History</span>
        <div class="dropdown">
          <a class="text-dark text-decoration-none d-flex align-items-center gap-2 dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <i class="bi bi-person-circle fs-5 text-green"></i>
            <span id="userName">Staff</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="profile.html"><i class="bi bi-person me-2"></i>Profile</a></li>
            <li><a class="dropdown-item" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4">
    <div class="row">
      <div class="col-lg-2 col-md-3 mb-4">
        <div class="list-group shadow-sm rounded-3 overflow-hidden">
          <a href="dashboard.html" class="list-group-item list-group-item-action d-flex align-items-center gap-3">
            <i class="bi bi-speedometer2 text-green"></i> Dashboard
          </a>
          <a href="assessment-new.html" class="list-group-item list-group-item-action d-flex align-items-center gap-3">
            <i class="bi bi-plus-circle text-green"></i> New Assessment
          </a>
          <a href="assessment-history.html" class="list-group-item list-group-item-action active bg-green border-green d-flex align-items-center gap-3">
            <i class="bi bi-clock-history"></i> Assessment History
          </a>
          <a href="profile.html" class="list-group-item list-group-item-action d-flex align-items-center gap-3">
            <i class="bi bi-person text-green"></i> My Profile
          </a>
        </div>
      </div>

      <div class="col-lg-10 col-md-9">
        <h4 class="fw-bold mb-4"><i class="bi bi-clock-history text-green me-2"></i>Assessment History</h4>

        <!-- Filters -->
        <div class="filter-section">
          <div class="row g-2 align-items-end">
            <div class="col-md-4">
              <label class="fw-semibold small mb-1">Search</label>
              <div class="input-group">
                <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                <input type="text" class="form-control" id="searchInput" placeholder="Customer name, product..." oninput="filterTable()">
              </div>
            </div>
            <div class="col-md-2">
              <label class="fw-semibold small mb-1">Status</label>
              <select class="form-select" id="statusFilter" onchange="filterTable()">
                <option value="all">All</option>
                <option value="completed">Completed</option>
                <option value="pending">Pending</option>
                <option value="in-progress">In Progress</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="fw-semibold small mb-1">Type</label>
              <select class="form-select" id="typeFilter" onchange="filterTable()">
                <option value="all">All Types</option>
                <option value="1">TV</option>
                <option value="2">AC</option>
                <option value="3">Fridge</option>
                <option value="4">Washing Machine</option>
                <option value="5">Fan</option>
                <option value="6">Laptop</option>
                <option value="7">Mobile</option>
                <option value="8">Monitor</option>
                <option value="9">Keyboard</option>
                <option value="10">Mouse</option>
              </select>
            </div>
            <div class="col-md-2">
              <label class="fw-semibold small mb-1">Date From</label>
              <input type="date" class="form-control" id="dateFrom" onchange="filterTable()">
            </div>
            <div class="col-md-2 d-flex gap-2">
              <div class="export-btns w-100 align-self-end">
                <button class="btn btn-outline-success flex-fill" onclick="exportPDF()" title="Export PDF"><i class="bi bi-filetype-pdf"></i></button>
                <button class="btn btn-outline-success flex-fill" onclick="exportExcel()" title="Export Excel"><i class="bi bi-file-earmark-excel"></i></button>
              </div>
            </div>
          </div>
        </div>

        <!-- Table -->
        <div class="table-custom">
          <div class="table-responsive">
            <table class="table mb-0" id="historyTable">
              <thead>
                <tr>
                  <th>#ID</th>
                  <th>Date</th>
                  <th>Customer</th>
                  <th>Product</th>
                  <th>Condition</th>
                  <th>Value</th>
                  <th>Status</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="historyTableBody">
                <tr>
                  <td colspan="8" class="text-center text-muted py-4">Loading assessments...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <nav class="mt-3 d-flex justify-content-between align-items-center">
          <small class="text-muted" id="tableInfo">Showing 0 entries</small>
          <ul class="pagination pagination-sm mb-0" id="tablePagination"></ul>
        </nav>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
    (function() {
      const user = checkAuth();
      if (user) document.getElementById('userName').textContent = user.full_name || user.username;

      let allAssessments = [];
      let filteredData = [];
      let currentPage = 1;
      const rowsPerPage = 5;

      async function loadAssessments() {
        try {
          const params = new URLSearchParams();
          const searchVal = document.getElementById('searchInput')?.value.toLowerCase();
          const statusVal = document.getElementById('statusFilter')?.value;
          const typeVal = document.getElementById('typeFilter')?.value;
          const dateVal = document.getElementById('dateFrom')?.value;
          if (statusVal && statusVal !== 'all') params.set('status', statusVal);
          if (typeVal && typeVal !== 'all') params.set('type', typeVal);
          if (dateVal) params.set('date_from', dateVal);
          const res = await fetch(API_BASE + '/assessments?' + params, { headers: getAuthHeaders() });
          const data = await res.json();
          allAssessments = (data.assessments || []).map(a => ({
            id: '#' + a.id, date: new Date(a.createdAt || a.created_at).toLocaleDateString(),
            customer: a.customer_name || '-', product: a.product_catalog?.name || '-',
            brand: a.brand || '-', condition: (a.condition || '-').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
            value: a.value_estimate || 0, status: a.status
          }));
          if (searchVal) {
            allAssessments = allAssessments.filter(a => a.customer.toLowerCase().includes(searchVal) || a.product.toLowerCase().includes(searchVal));
          }
          filteredData = [...allAssessments];
          currentPage = 1;
          renderTable();
        } catch (e) {
          document.getElementById('historyTableBody').innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">Error loading assessments</td></tr>';
        }
      }

      function renderTable() {
        const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
        if (currentPage > totalPages) currentPage = totalPages;
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = filteredData.slice(start, end);
        const tbody = document.getElementById('historyTableBody');
        tbody.innerHTML = pageData.length ? pageData.map(a => `
          <tr>
            <td class="fw-semibold">${a.id}</td>
            <td>${a.date}</td>
            <td>${a.customer}</td>
            <td>${a.product} (${a.brand})</td>
            <td><span class="badge bg-${a.condition === 'Excellent' ? 'success' : a.condition === 'Good' ? 'primary' : a.condition === 'Fair' ? 'warning' : 'secondary'}">${a.condition}</span></td>
            <td>₹${a.value.toLocaleString('en-IN')}</td>
            <td><span class="status-badge ${a.status}">${a.status.charAt(0).toUpperCase() + a.status.slice(1)}</span></td>
            <td><button class="btn btn-sm btn-outline-green" onclick="showToast('Assessment ${a.id}')"><i class="bi bi-eye"></i></button></td>
          </tr>
        `).join('') : '<tr><td colspan="8" class="text-center text-muted py-4">No assessments found</td></tr>';
        document.getElementById('tableInfo').textContent = `Showing ${start + 1}-${Math.min(end, filteredData.length)} of ${filteredData.length} entries`;
        let pagHtml = `<li class="page-item ${currentPage === 1 ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage - 1})">&laquo;</a></li>`;
        for (let i = 1; i <= totalPages; i++) pagHtml += `<li class="page-item ${i === currentPage ? 'active' : ''}"><a class="page-link" href="#" onclick="changePage(${i})">${i}</a></li>`;
        pagHtml += `<li class="page-item ${currentPage === totalPages ? 'disabled' : ''}"><a class="page-link" href="#" onclick="changePage(${currentPage + 1})">&raquo;</a></li>`;
        document.getElementById('tablePagination').innerHTML = pagHtml;
      }

      window.filterTable = function() { loadAssessments(); };
      window.changePage = function(p) { currentPage = p; renderTable(); };

      window.exportPDF = async function() {
        try {
          const res = await fetch(API_BASE + '/assessments/export?format=pdf', { headers: getAuthHeaders() });
          if (!res.ok) throw new Error('Download failed');
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'assessments.pdf';
          a.click();
          URL.revokeObjectURL(url);
          showToast('PDF downloaded');
        } catch (err) {
          showToast('Failed to export PDF', 'error');
        }
      };

      window.exportExcel = async function() {
        try {
          const res = await fetch(API_BASE + '/assessments/export?format=xlsx', { headers: getAuthHeaders() });
          if (!res.ok) throw new Error('Download failed');
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'assessments.xlsx';
          a.click();
          URL.revokeObjectURL(url);
          showToast('Excel downloaded');
        } catch (err) {
          showToast('Failed to export Excel', 'error');
        }
      };

      loadAssessments();
    })();
  </script>
</body>
</html>
