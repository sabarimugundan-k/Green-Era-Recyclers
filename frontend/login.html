<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login - Green Era Recyclers</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <i class="bi bi-recycle"></i>
        <h3>Green Era Recyclers</h3>
        <p>Staff Portal Login</p>
      </div>

      <form id="loginForm">
        <div class="form-floating mb-3">
          <input type="text" class="form-control" id="username" placeholder="Username" required autofocus>
          <label for="username"><i class="bi bi-person me-2"></i>Username</label>
        </div>
        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="password" placeholder="Password" required>
          <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember">
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <a href="#" class="text-decoration-none" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-primary-green w-100 btn-lg" id="loginBtn">
          <span id="loginBtnText"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</span>
          <span id="loginBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
        </button>
        <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
        <div class="text-center mt-3"><small class="text-muted">Demo: <code>staff</code> / <code>Admin@123</code></small></div>
      </form>

      <div class="text-center mt-4">
        <a href="index.html" class="text-decoration-none text-muted"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
      </div>
    </div>
  </div>

  <!-- Forgot Password Modal -->
  <div class="modal fade" id="forgotPasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold"><i class="bi bi-key me-2 text-green"></i>Reset Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p class="text-muted">Enter your email address and we'll send you a password reset link.</p>
          <form id="forgotPasswordForm">
            <div class="form-floating mb-3">
              <input type="email" class="form-control" id="resetEmail" placeholder="Email" required>
              <label for="resetEmail">Email Address</label>
            </div>
            <button type="submit" class="btn btn-primary-green w-100">
              <i class="bi bi-send me-2"></i>Send Reset Link
            </button>
          </form>
          <div id="resetSuccess" class="alert alert-success mt-3 d-none">Reset link sent! Check your email.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/login.js"></script>
  <script>
    const forgotForm = document.getElementById('forgotPasswordForm');
    if (forgotForm) {
      forgotForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value;
        try { await fetch('/api/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) }); } catch (_) { }
        document.getElementById('resetSuccess').classList.remove('d-none');
        document.getElementById('resetEmail').value = '';
      });
    }
  </script>
</body>
</html>
